<div class="analysis-block">
    <h2>{{ analysis_name }}</h2>
    {% if charts %}
    <div class="charts">
        {% for chart_b64 in charts %}
        <img src="data:image/png;base64,{{ chart_b64 }}" class="chart-img" />
        {% endfor %}
    </div>
    {% endif %}
    {% if summary %}
    <table class="summary-table">
        <thead>
            <tr>
                <th>Metric</th>
                <th>Value</th>
            </tr>
        </thead>
        <tbody>
            {% for key, value in summary.items() %}
            <tr>
                <td>{{ key }}</td>
                <td>{{ value }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    {% endif %}
    {% if interpretation %}
    <div class="interpretation">
        <h3>AI Interpretation</h3>
        <p>{{ interpretation }}</p>
    </div>
    {% endif %}
</div>
